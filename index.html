<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PG Hostel — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Login page specific styles */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 14px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <script src="js/main.js"></script>

  <div class="login-page">
    <div class="login-box">

      <!-- LOGO -->
      <div class="login-logo">
        <div class="login-icon">🏠</div>
        <div class="login-title">PG Hostel</div>
        <div class="login-sub">Sign in to manage your hostel</div>
      </div>

      <!-- ERROR MESSAGE (hidden by default) -->
      <div class="error-msg" id="error-msg">
        ❌ Wrong username or password. Try again.
      </div>

      <!-- LOGIN FORM -->
      <div class="form-group">
        <label class="form-label">Username</label>
        <input
          class="form-input"
          id="username"
          type="text"
          placeholder="Enter your username"
        >
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          class="form-input"
          id="password"
          type="password"
          placeholder="Enter your password"
        >
      </div>

      <button class="btn btn-primary" onclick="doLogin()">
        Login
      </button>

      <div class="login-footer">
        PG Hostel Management System
      </div>

    </div>
  </div>

  <script>
    // Simple login check
    // Username: admin   Password: pg1234
    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('error-msg');

      if (username === 'admin' && password === 'pg1234') {
        // Save login status
        localStorage.setItem('pg-logged-in', 'true');
        // Go to dashboard
        window.location.href = 'dashboard.html';
      } else {
        // Show error
        errorMsg.style.display = 'block';
      }
    }

    // Press Enter to login
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    // If already logged in, go straight to dashboard
    if (localStorage.getItem('pg-logged-in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
